services:
  claudebox:
    build: .
    container_name: claudebox
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.disable_ipv6=1
    volumes:
      - ./configs/amnezia.conf:/etc/amnezia/awg0.conf:ro
      - ${PROJECTS_PATH:-./_projects}:/home/claude/projects
      - claude-config:/home/claude/.claude
    env_file:
      - .env
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - KILLSWITCH=${KILLSWITCH:-1}
    stdin_open: true
    tty: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "health-check"]
      interval: 60s
      timeout: 10s
      retries: 3

volumes:
  claude-config:
